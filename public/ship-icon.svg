<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36">
  <!-- Top-down fishing vessel: bow points up -->
  <!-- Hull -->
  <path d="M12 1 C16 4 19 10 19 20 Q19 32 12 35 Q5 32 5 20 C5 10 8 4 12 1Z"
        fill="#38bdf8" fill-opacity="0.92" stroke="#7dd3fc" stroke-width="0.8"/>
  <!-- Deck superstructure -->
  <rect x="7.5" y="16" width="9" height="10" rx="1.5"
        fill="#0284c7" fill-opacity="0.95"/>
  <!-- Bridge / wheelhouse -->
  <rect x="9" y="12" width="6" height="6" rx="1"
        fill="#1d4ed8"/>
  <!-- Mast -->
  <circle cx="12" cy="7" r="1.4" fill="#e0f2fe"/>
</svg>
